services:
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      - COMPOSITE_URL=http://composite-service:8000
    depends_on:
      - composite-service

  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8005:8000"

  composite-service:
    build: ./composite-service/make-booking-composite-service
    container_name: make-booking-composite-service
    environment:
      - AUTH_URL=http://auth-service:8000
      - AI_RECOMMENDATION_URL=http://ai-recommendation-wrapper:8000
    depends_on:
      - user-service
      - ai-recommendation-wrapper

  calendar-service:
    build:
      context: .
      dockerfile: ./services/calendar-service/Dockerfile
    container_name: calendar-service
    ports:
      - "8009:8000"

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification_service/Dockerfile
    container_name: notification-service
    ports:
      - "8010:8000"

  activity-service:
    build:
      context: ./services/activity-service
      dockerfile: Dockerfile
    container_name: activity-service
    ports:
      - "8011:8000"

  quiz-service:
    build:
      context: ./services/quiz-service
      dockerfile: Dockerfile
    container_name: quiz-service
    ports:
      - "8012:8000"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - QUIZ_EXCHANGE=quiz_events
    depends_on:
      - rabbitmq

  ai-recommendation-wrapper:
    build:
      context: ./wrappers/ai-recommendation-wrapper
      dockerfile: Dockerfile
    container_name: ai-recommendation-wrapper
    ports:
      - "8006:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - QUIZ_EXCHANGE=quiz_events
      - QUIZ_QUEUE=ai_recommendation_queue
      - ORCHESTRATOR_URL=http://composite-service:8000/api/recommendations
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
